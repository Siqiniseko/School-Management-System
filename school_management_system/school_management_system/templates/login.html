{% extends "base.html" %}

{% block title %}Login - School Management System{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">
                        <i class="fas fa-school"></i> School Management
                    </h4>
                </div>
                <div class="card-body p-4">
                    <h5 class="text-center mb-4">Sign in to access your portal</h5>
                    
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="username" name="username" 
                                       placeholder="Enter your username" required autofocus>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" 
                                       placeholder="••••••••" required>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-sign-in-alt"></i> Sign In
                            </button>
                        </div>
                    </form>
                    
                    <hr class="my-4">
                    
                    <h6 class="text-center mb-3">Quick Demo Access</h6>
                    <div class="row g-2">
                        <div class="col-4">
                            <button class="btn btn-outline-primary w-100 demo-login" data-role="admin">
                                <i class="fas fa-user-shield"></i> Admin
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-outline-success w-100 demo-login" data-role="teacher">
                                <i class="fas fa-chalkboard-teacher"></i> Teacher
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-outline-info w-100 demo-login" data-role="learner">
                                <i class="fas fa-user-graduate"></i> Learner
                            </button>
                        </div>
                        <div class="col-6">
                            <button class="btn btn-outline-warning w-100 demo-login" data-role="parent">
                                <i class="fas fa-users"></i> Parent
                            </button>
                        </div>
                        <div class="col-6">
                            <button class="btn btn-outline-secondary w-100 demo-login" data-role="accountant">
                                <i class="fas fa-calculator"></i> Accountant
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-footer text-center text-muted py-3">
                    <small>Made with Replit</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelectorAll('.demo-login').forEach(button => {
    button.addEventListener('click', function() {
        const role = this.dataset.role;
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = "{{ url_for('login') }}";
        
        const roleInput = document.createElement('input');
        roleInput.type = 'hidden';
        roleInput.name = 'role';
        roleInput.value = role;
        
        form.appendChild(roleInput);
        document.body.appendChild(form);
        form.submit();
    });
});
</script>
{% endblock %}
